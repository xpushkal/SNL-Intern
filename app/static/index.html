<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SHL Assessment Recommender</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --muted:#94a3b8; --accent:#6366f1; --user:#334155; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:#e2e8f0; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; background:var(--panel); border-bottom:1px solid #334155;
           display:flex; align-items:center; gap:10px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .dot { width:9px; height:9px; border-radius:50%; background:#22c55e; }
  header .sp { flex:1; } header button { background:#334155; color:#e2e8f0; border:0;
           padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px; }
  #chat { flex:1; overflow-y:auto; padding:20px; max-width:820px; width:100%; margin:0 auto; }
  .msg { margin:12px 0; display:flex; }
  .msg.user { justify-content:flex-end; }
  .bubble { padding:10px 14px; border-radius:14px; max-width:80%; white-space:pre-wrap; }
  .user .bubble { background:var(--user); }
  .assistant .bubble { background:var(--panel); }
  .recs { max-width:820px; width:100%; margin:2px auto 12px; display:grid; gap:8px; }
  .rec { display:flex; align-items:center; gap:10px; background:#172033; border:1px solid #334155;
         border-radius:10px; padding:10px 12px; }
  .badge { font-weight:700; font-size:12px; background:var(--accent); color:#fff;
           border-radius:6px; padding:2px 8px; min-width:26px; text-align:center; }
  .rec a { color:#a5b4fc; text-decoration:none; font-weight:500; }
  .rec a:hover { text-decoration:underline; }
  .end { text-align:center; color:var(--muted); font-size:13px; margin:8px 0; }
  form { display:flex; gap:8px; padding:14px 20px; background:var(--panel);
         border-top:1px solid #334155; max-width:820px; width:100%; margin:0 auto; }
  input { flex:1; background:#0b1220; border:1px solid #334155; color:#e2e8f0;
          border-radius:10px; padding:11px 14px; font-size:15px; outline:none; }
  input:focus { border-color:var(--accent); }
  form button { background:var(--accent); color:#fff; border:0; border-radius:10px;
                padding:0 18px; font-weight:600; cursor:pointer; }
  form button:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--muted); font-size:13px; text-align:center; margin-top:30px; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span><h1>SHL Assessment Recommender</h1>
    <span class="sp"></span>
    <button onclick="reset()">New conversation</button>
  </header>
  <div id="chat"><div class="hint">Ask about the role you're hiring for — e.g.
    “Hiring a mid-level Java developer who works with stakeholders”.</div></div>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="Type a message…" />
    <button id="send" type="submit">Send</button>
  </form>
<script>
let history = [];
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

function reset(){ history = []; chat.innerHTML =
  '<div class="hint">New conversation started.</div>'; input.focus(); }

function el(cls, html){ const d=document.createElement("div"); d.className=cls; d.innerHTML=html; return d; }
function esc(s){ return (s||"").replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function addMsg(role, text){
  chat.appendChild(el("msg "+role, '<div class="bubble">'+esc(text)+'</div>'));
  chat.scrollTop = chat.scrollHeight;
}
function addRecs(recs){
  if(!recs || !recs.length) return;
  const wrap = el("recs","");
  recs.forEach((r,i)=> wrap.appendChild(el("rec",
    '<span class="badge">'+esc(r.test_type)+'</span>'+
    '<a href="'+esc(r.url)+'" target="_blank" rel="noopener">'+(i+1)+'. '+esc(r.name)+'</a>')));
  chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
}

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const text = input.value.trim(); if(!text) return;
  input.value=""; addMsg("user", text);
  history.push({role:"user", content:text});
  send.disabled = true;
  try{
    const res = await fetch("/chat", {method:"POST",
      headers:{"content-type":"application/json"}, body:JSON.stringify({messages:history})});
    const data = await res.json();
    addMsg("assistant", data.reply);
    addRecs(data.recommendations);
    history.push({role:"assistant", content:data.reply});
    if(data.end_of_conversation) chat.appendChild(el("end","— conversation complete —"));
  }catch(err){ addMsg("assistant","(network error: "+err+")"); }
  finally{ send.disabled=false; input.focus(); }
});
input.focus();
</script>
</body>
</html>
